version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: checkflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: checkflow
      POSTGRES_PASSWORD: checkflow123
      POSTGRES_DB: checkflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: checkflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App (instância 1) ─────────────────────────────────────────
  app_1:
    build: .
    container_name: checkflow_app_1
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: "postgresql://checkflow:checkflow123@postgres:5432/checkflow?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: ${JWT_SECRET:-checkflow-jwt-secret-prod}
      JWT_EXPIRES_IN: "1d"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── App (instância 2 — para demonstrar escalabilidade) ────────
  app_2:
    build: .
    container_name: checkflow_app_2
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: "postgresql://checkflow:checkflow123@postgres:5432/checkflow?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: ${JWT_SECRET:-checkflow-jwt-secret-prod}
      JWT_EXPIRES_IN: "1d"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx (load balancer) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: checkflow_nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app_1
      - app_2

volumes:
  postgres_data:
  redis_data:
